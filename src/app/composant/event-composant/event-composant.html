<div
    class="group relative bg-white border-2 border-amber-200 rounded-3xl overflow-hidden hover:border-amber-400 hover:shadow-2xl transition-all duration-500">

    <!-- Effet lumineux au survol -->
    <div
        class="absolute inset-0 bg-gradient-to-r from-amber-50/0 via-amber-50/50 to-amber-50/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
    </div>

    <div class="relative p-8">
        <div class="grid gap-6">
            <!-- Colonne Gauche: Info Boutique & Box -->
            <div class="lg:col-span-7">
                <!-- En-tête Boutique -->
                <div class="mb-6">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3 mb-2">
                            <h3 class="text-3xl font-black text-slate-800">
                                {{ event.title }}
                                <span *ngIf="event.shopId" class="text-lg font-normal text-gray-500">by {{
                                    event.shopId.name }}</span>
                            </h3>
                        </div>
                    </div>
                    <div class="mb-6 flex gap-1">
                        <span *ngFor="let theme of event.themes"
                            class="px-3 py-1 rounded-full text-xs font-bold border-2 border-gray-600 text-gray-600 bg-gray-100">
                            {{ theme }}
                        </span>
                    </div>
                    <div class="flex flex-row gap-8 mb-6">
                        <div
                            class="bg-gradient-to-br from-slate-50 to-slate-100 rounded-2xl p-5 border-2 border-slate-200 mb-6">
                            <div class="space-y-4">
                                <div>
                                    <div class="text-slate-500 text-xs font-bold mb-1">DÉBUT
                                    </div>
                                    <div class="text-slate-800 font-bold text-lg">{{
                                        event.startDate | date:'dd/MM/yyyy HH:mm':'UTC' }}
                                    </div>
                                </div>
                                <div class="h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent">
                                </div>
                                <div>
                                    <div class="text-slate-500 text-xs font-bold mb-1">FIN</div>
                                    <div class="text-slate-800 font-bold text-lg">{{
                                        event.endDate | date:'dd/MM/yyyy HH:mm':'UTC' }}</div>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div
                                class="bg-gradient-to-br w-[max-content] h-fit from-amber-100 to-orange-100 rounded-2xl p-6 border-2 border-amber-300">

                                <div class="flex items-center justify-between text-sm">
                                    <div>
                                        <div class="text-amber-700 font-medium">Durée</div>
                                        <div class="text-slate-800 font-bold">
                                            {{ getTimeBetween(event.startDate,
                                            event.endDate) }}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button (click)="onClick()"
                                class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 px-6 rounded-xl hover:from-indigo-600 hover:to-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                                <div class="flex items-center justify-center gap-2">
                                    Voir sur calendrier
                                </div>
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-6 mb-6">
                        <h4 class="text-sm font-bold text-slate-500 uppercase mb-3">
                            Description
                        </h4>

                        <p class="text-slate-700 leading-relaxed whitespace-pre-line">
                            {{ event.description }}
                        </p>
                    </div>
                    <div class="flex gap-3" *ngIf="isRequest">
                        <button (click)="onValidate()"
                            class="flex-1 bg-gradient-to-r from-emerald-500 to-green-500 text-white font-black py-4 px-6 rounded-xl hover:from-emerald-600 hover:to-green-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                            <div class="flex items-center justify-center gap-2">
                                <ng-icon name="valider" size="18"></ng-icon>
                                Valider
                            </div>
                        </button>

                        <button (click)="onRefuse()"
                            class="flex-1 bg-gradient-to-r from-red-500 to-rose-500 text-white font-black py-4 px-6 rounded-xl hover:from-red-600 hover:to-rose-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                            <div class="flex items-center justify-center gap-2">
                                <ng-icon name="rejeter" size="18"></ng-icon>
                                Refuser
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
