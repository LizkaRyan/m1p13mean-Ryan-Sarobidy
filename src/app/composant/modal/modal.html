<div *ngIf="isVisible"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     [class.modal-entering]="!isAnimatingOut"
     [class.modal-leaving]="isAnimatingOut">

  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm"
    [class.backdrop-entering]="!isAnimatingOut"
    [class.backdrop-leaving]="isAnimatingOut"
    (click)="onBackdropClick()">
  </div>

  <!-- Panel -->
  <div
    class="relative w-full bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden"
    [class]="getSizeClass()"
    [class.panel-entering]="!isAnimatingOut"
    [class.panel-leaving]="isAnimatingOut"
    style="max-height: 90vh;">

    <!-- Header -->
    <div class="flex items-start justify-between px-8 py-6 border-b-2 border-slate-100 shrink-0">
      <div>
        <h2 class="text-2xl font-black text-slate-800 leading-tight">{{ title }}</h2>
        <p *ngIf="subtitle" class="text-slate-500 text-sm font-medium mt-1">{{ subtitle }}</p>
      </div>
      <button
        (click)="close()"
        class="ml-4 w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-all shrink-0">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body (scrollable) -->
    <div class="overflow-y-auto grow px-8 py-6">
      <ng-content></ng-content>
    </div>

    <!-- Footer optionnel -->
    <div *ngIf="showFooter"
         class="flex items-center justify-end gap-3 px-8 py-5 border-t-2 border-slate-100 shrink-0">
      <ng-content select="[slot=footer]"></ng-content>

      <!-- Boutons par défaut si aucun contenu footer personnalisé -->
      <button
        (click)="close()"
        class="px-5 py-2.5 border-2 border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition-all">
        {{ cancelLabel }}
      </button>
      <button
        (click)="confirm()"
        [disabled]="confirmDisabled"
        class="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md hover:shadow-lg">
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
