<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
  <div class="container mx-auto px-4 py-8">

    <div class="mb-10">
      <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 mb-2" style="text-align: center;">
        Réservation de salles
      </h1>
    </div>

    <!-- Alerte erreur uniquement -->
    <div *ngIf="alertMessage" class="custom-alert" [ngClass]="alertType">
      {{ alertMessage }}
      <span class="close-btn" (click)="closeAlert()">×</span>
    </div>

    <ng-container *ngIf="rooms$ | async as rooms">
      <div *ngIf="!rooms.length" class="bg-white rounded-2xl shadow-lg border border-slate-200 p-12 text-center">
        <div class="text-6xl mb-4">🏢</div>
        <h3 class="text-xl font-semibold text-slate-700">Aucune salle disponible pour le moment</h3>
      </div>

      <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div *ngFor="let r of rooms"
          class="group bg-white rounded-2xl border-2 border-slate-200 overflow-hidden hover:border-indigo-300 hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">

          <div class="bg-gradient-to-r from-indigo-500 to-purple-500 px-6 py-4">
            <h3 class="text-xl font-bold text-white truncate">{{ r.name }}</h3>
          </div>

          <div class="p-6 space-y-3">
            <div class="flex items-center gap-3 text-slate-600">
              <span class="text-sm">Capacité : <strong>{{ r.capacity }} personnes</strong></span>
            </div>
            <div class="flex items-center gap-3 text-slate-600">
              <span class="text-sm">Location mensuelle : <strong>{{ r.rentPrice }} €</strong></span>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-sm px-2 py-1 rounded-full font-semibold"
                [ngClass]="{
                  'bg-green-100 text-green-700': r.status.label === 'Disponible',
                  'bg-red-100 text-red-700': r.status.label !== 'Disponible'
                }">
                {{ r.status.label }}
              </span>
            </div>
          </div>

          <div class="px-6 pb-6">
            <button class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors duration-200"
              (click)="reserveRoom(r)">
              Réserver
            </button>
          </div>

        </div>
      </div>
    </ng-container>
  </div>
</div>
