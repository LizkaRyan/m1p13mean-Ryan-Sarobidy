<h2>Réservation de salles</h2>

<table class="data-table">
  <thead>
    <tr>
      <th>Sélection</th>
      <th>Nom</th>
      <th>Catégorie</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let shop of shops">
      <!-- Checkbox : une seule sélection possible -->
      <td>
        <input 
          type="checkbox" 
          [checked]="selectedShop?.id === shop.id" 
          (change)="selectShop(shop)">
      </td>
      <td>{{ shop.name }}</td>
      <td>{{ shop.category }}</td>
      <td>
        <button 
          class="btn btn-primary" 
          [disabled]="!selectedShop" 
          (click)="reserveShop(selectedShop)">
          Réserver
        </button>
      </td>
    </tr>
  </tbody>
</table>

<ng-template #noData>
  <p>Aucune salle disponible pour le moment.</p>
</ng-template>
