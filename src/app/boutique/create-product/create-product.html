<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 py-10">
  <div class="container mx-auto px-4 max-w-2xl">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">

      <!-- HEADER -->
      <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-8 py-6">
        <h2 class="text-2xl font-bold text-white text-center">Nouveau Produit</h2>
      </div>

      <!-- ALERT -->
      <div *ngIf="alertMessage" class="custom-alert" [ngClass]="alertType">
        {{ alertMessage }}
        <span class="close-btn" (click)="alertMessage = null">×</span>
      </div>

      <form *ngIf="productForm" [formGroup]="productForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

        <!-- Nom -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Nom du produit</label>
          <input type="text" formControlName="name"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none">
          <div *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched"
            class="text-red-500 text-sm mt-1">Le nom est requis</div>
        </div>

        <!-- Prix unitaire -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Prix unitaire (€)</label>
          <input type="number" formControlName="unityPrice" min="0" step="0.01"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none">
          <div *ngIf="productForm.get('unityPrice')?.invalid && productForm.get('unityPrice')?.touched"
            class="text-red-500 text-sm mt-1">Le prix est requis</div>
        </div>

        <!-- Catégorie -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Catégorie</label>
          <select formControlName="category"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none bg-white">
            <option value="" disabled>Choisir une catégorie</option>
            <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.label }}</option>
          </select>
          <div *ngIf="productForm.get('category')?.invalid && productForm.get('category')?.touched"
            class="text-red-500 text-sm mt-1">La catégorie est requise</div>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Description</label>
          <textarea formControlName="description" rows="3"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none resize-none">
          </textarea>
        </div>

        <!-- Statut -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Statut</label>
          <select formControlName="status"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none bg-white">
            <option value="" disabled>Choisir un statut</option>
            <option *ngFor="let s of statuses" [ngValue]="s">{{ s.label }}</option>
          </select>
          <div *ngIf="productForm.get('status')?.invalid && productForm.get('status')?.touched"
            class="text-red-500 text-sm mt-1">Le statut est requis</div>
        </div>

        <!-- Photo principale (MAIN) -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Photo principale</label>
          <div class="upload-zone" (click)="mainPhotoInput.click()" (dragover)="$event.preventDefault()" (drop)="onMainPhotoDrop($event)">
            <input #mainPhotoInput type="file" accept="image/*" class="hidden" (change)="onMainPhotoChange($event)">
            <div *ngIf="!mainPhotoPreview" class="upload-placeholder">
              <div class="text-4xl mb-2">🖼️</div>
              <p class="text-slate-500 text-sm">Cliquer ou glisser une image</p>
            </div>
            <img *ngIf="mainPhotoPreview" [src]="mainPhotoPreview" class="preview-img" alt="Aperçu photo principale">
          </div>
        </div>

        <!-- Photos supplémentaires (DETAIL) -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Photos supplémentaires</label>
          <div class="upload-zone" (click)="detailPhotosInput.click()">
            <input #detailPhotosInput type="file" accept="image/*" multiple class="hidden" (change)="onDetailPhotosChange($event)">
            <div *ngIf="!detailPhotoPreviews.length" class="upload-placeholder">
              <div class="text-4xl mb-2">📷</div>
              <p class="text-slate-500 text-sm">Cliquer pour sélectionner plusieurs images</p>
            </div>
            <div *ngIf="detailPhotoPreviews.length" class="preview-grid">
              <div *ngFor="let preview of detailPhotoPreviews; let i = index" class="preview-thumb">
                <img [src]="preview" alt="Photo {{ i+1 }}">
                <button type="button" class="remove-thumb" (click)="removeDetailPhoto(i, $event)">×</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Boutons -->
        <div class="flex gap-3 pt-4">
          <button type="button" (click)="goBack()"
            class="px-6 py-3 border-2 border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition-all">
            Annuler
          </button>
          <button type="submit" [disabled]="productForm.invalid || isSubmitting"
            class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3 px-6 rounded-xl hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg">
            {{ isSubmitting ? 'Enregistrement...' : 'Créer le produit' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
