<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
    <div class="container m-auto px-4 py-8">
        <div class="mb-10">
            <h1
                class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">
                Validation des évènements
            </h1>
        </div>
        <div class="grid grid-cols-2 gap-8">
            <div class="flex flex-col gap-3">
                <div class="relative mb-4 w-full sm:w-auto sm:min-w-[300px]">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <ng-icon name="search" size="18" class="text-slate-400"></ng-icon>
                    </div>
                    <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange($event)"
                        placeholder="Rechercher par nom..."
                        class="w-full pl-10 pr-10 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none bg-white" />
                </div>

                <div *ngIf="reservations$ | async as requests" class="space-y-4">
                    <div *ngIf="requests.length === 0"
                        class="bg-white rounded-2xl shadow-lg border border-slate-200 p-12 text-center">
                        <div class="text-6xl mb-4"><ng-icon name="empty" size="48"></ng-icon></div>
                        <h3 class="text-xl font-semibold text-slate-700 mb-2">Aucune demande enregistrée</h3>
                    </div>
                </div>

                <div *ngFor="let request of reservations$ | async; let i = index"
                    class="lg:col-span-1 w-[-webkit-fill-available]">
                    <div class="relative">
                        <div class="grid gap-6">
                            <!-- Colonne Gauche: Info Boutique & Box -->
                            <app-event-composant [event]="request" [viewOnCalendar]="viewOnCalendar.bind(this)"
                                [isRequest]="true" [validateEvent]="validateEvent.bind(this)"
                                [refuseEvent]="rejectEvent.bind(this)" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 p-3 bg-white h-[min-content] sticky top-2">
                <!-- Légende des événements -->
                <div class="flex items-center gap-4 mb-3">
                    <div class="flex items-center gap-1">
                        <span class="w-4 h-4 rounded-full bg-[#22C55E]"></span>
                        <span class="text-sm text-gray-700">Évènement en cours</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-4 h-4 rounded-full bg-[#F59E0B]"></span>
                        <span class="text-sm text-gray-700">Requête d'évènement</span>
                    </div>
                </div>
                <full-calendar #calendar *ngIf="calendarOptions" [options]="calendarOptions"></full-calendar>
            </div>
        </div>
    </div>
</div>
