<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
    <div class="container m-auto px-4 py-8">
        <div class="mb-10">
            <h1
                class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">
                Validation des évènements
            </h1>
        </div>
        <div class="grid grid-cols-2 gap-8">
            <div class="flex">
                <div class="lg:col-span-1 w-[-webkit-fill-available]">
                    <div
                        class="group relative bg-white border-2 border-amber-200 rounded-3xl overflow-hidden hover:border-amber-400 hover:shadow-2xl transition-all duration-500">

                        <!-- Effet lumineux au survol -->
                        <div
                            class="absolute inset-0 bg-gradient-to-r from-amber-50/0 via-amber-50/50 to-amber-50/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                        </div>

                        <div class="relative p-8">
                            <div class="grid gap-6">
                                <!-- Colonne Gauche: Info Boutique & Box -->
                                <div class="lg:col-span-7">
                                    <!-- En-tête Boutique -->
                                    <div class="mb-6">
                                        <div class="flex items-start justify-between mb-3">
                                            <div class="flex items-center gap-3 mb-2">
                                                <h3 class="text-3xl font-black text-slate-800">
                                                    Black & White

                                                </h3>
                                            </div>
                                        </div>
                                        <div class="mb-6 flex gap-1">
                                            <span
                                                class="px-3 py-1 rounded-full text-xs font-bold border-2 border-gray-600 text-gray-600 bg-gray-100">
                                                Musique
                                            </span>
                                            <span
                                                class="px-3 py-1 rounded-full text-xs font-bold border-2 border-gray-600 text-gray-600 bg-gray-100">
                                                Vêtements
                                            </span>
                                        </div>
                                        <div class="flex flex-row gap-8">
                                            <div
                                                class="bg-gradient-to-br from-slate-50 to-slate-100 rounded-2xl p-5 border-2 border-slate-200 mb-6">
                                                <div class="space-y-4">
                                                    <div>
                                                        <div class="text-slate-500 text-xs font-bold mb-1">DÉBUT</div>
                                                        <div class="text-slate-800 font-bold text-lg">10/12/2025</div>
                                                    </div>
                                                    <div
                                                        class="h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent">
                                                    </div>
                                                    <div>
                                                        <div class="text-slate-500 text-xs font-bold mb-1">FIN</div>
                                                        <div class="text-slate-800 font-bold text-lg">13/04/2026</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div
                                                class="bg-gradient-to-br h-fit from-amber-100 to-orange-100 rounded-2xl p-6 border-2 border-amber-300 mb-6">

                                                <div class="flex items-center justify-between text-sm">
                                                    <div>
                                                        <div class="text-amber-700 font-medium">Durée</div>
                                                        <div class="text-slate-800 font-bold">
                                                            15
                                                            Jours</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="flex gap-3">
                                            <button
                                                class="flex-1 bg-gradient-to-r from-emerald-500 to-green-500 text-white font-black py-4 px-6 rounded-xl hover:from-emerald-600 hover:to-green-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                                                <div class="flex items-center justify-center gap-2">
                                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                                        stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="3" d="M5 13l4 4L19 7" />
                                                    </svg>
                                                    Valider
                                                </div>
                                            </button>

                                            <button
                                                class="flex-1 bg-gradient-to-r from-red-500 to-rose-500 text-white font-black py-4 px-6 rounded-xl hover:from-red-600 hover:to-rose-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                                                <div class="flex items-center justify-center gap-2">
                                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                                        stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                                                    </svg>
                                                    Refuser
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 p-3 bg-white">
                <full-calendar #calendar *ngIf="calendarOptions" [options]="calendarOptions"></full-calendar>
            </div>
        </div>
    </div>
</div>
