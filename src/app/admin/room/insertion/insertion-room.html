<!-- FORMULAIRE - GAUCHE -->
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden top-8">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-8 py-6">
            <h2 class="text-2xl flex gap-2 font-bold text-white">
                <div class="flex items-center">
                    <ng-icon [name]="editingIndex !== null ? 'edit' : 'plus'" size="24"></ng-icon>
                </div>
                {{ editingIndex !== null ? 'Modifier le Box' : 'Nouveau Box' }}
            </h2>
        </div>

        <form [formGroup]="boxForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
            <!-- Nom du box -->
            <div class="form-group">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Nom du Box
                </label>
                <input type="text" formControlName="name"
                    class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none"
                    placeholder="Ex: Box 1">
                <div *ngIf="boxForm.get('name')?.invalid && boxForm.get('name')?.touched"
                    class="text-red-500 text-sm mt-1">
                    Le nom est requis
                </div>
            </div>

            <!-- Prix de location -->
            <div class="form-group">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Prix de location (Ar)
                </label>
                <div class="relative">
                    <input type="number" formControlName="rentPrice"
                        class="w-full pl-4 pr-2 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none"
                        placeholder="1220">
                </div>
            </div>

            <!-- Statut -->
            <div class="form-group">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Statut
                </label>
                <select formControlName="statusCode"
                    class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none cursor-pointer">
                    <option *ngFor="let status of statusOptions" [value]="status.code">
                        {{ status.label }}
                    </option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Étage -->
                <div class="form-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Étage
                    </label>
                    <input type="number" formControlName="floor"
                        class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none"
                        min="0">
                </div>

                <!-- Capacité -->
                <div class="form-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Capacité
                    </label>
                    <input type="number" formControlName="capacity"
                        class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none"
                        min="1">
                </div>
            </div>

            <!-- Dimensions -->
            <div class="bg-slate-50 rounded-xl p-4 border-2 border-slate-200">
                <h3 class="font-semibold flex gap-2 text-slate-700 mb-4">
                    <div class="flex items-center">
                        <ng-icon name="maximize" size="24"></ng-icon>
                    </div>
                    Dimensions
                </h3>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Longueur (m)</label>
                        <input type="number" formControlName="length"
                            class="w-full px-3 py-2 border-2 border-slate-200 rounded-lg focus:border-indigo-500 transition-all outline-none text-sm"
                            min="0" step="0.1">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Largeur (m)</label>
                        <input type="number" formControlName="width"
                            class="w-full px-3 py-2 border-2 border-slate-200 rounded-lg focus:border-indigo-500 transition-all outline-none text-sm"
                            min="0" step="0.1">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Hauteur (m)</label>
                        <input type="number" formControlName="height"
                            class="w-full px-3 py-2 border-2 border-slate-200 rounded-lg focus:border-indigo-500 transition-all outline-none text-sm"
                            min="0" step="0.1">
                    </div>
                </div>

                <div class="mt-3 text-center">
                    <span class="text-sm text-slate-600">
                        Surface:
                        <strong class="text-indigo-600">
                            {{ (boxForm.get('length')?.value || 0) * (boxForm.get('width')?.value || 0) |
                            number:'1.1-1' }} m²
                        </strong>
                    </span>
                </div>
            </div>

            <!-- Boutons -->
            <div class="flex gap-3 pt-4">
                <button type="submit" [disabled]="boxForm.invalid"
                    class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3 px-6 rounded-xl hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    {{ editingIndex !== null ? 'Mettre à jour' : 'Ajouter' }}
                </button>

                <button *ngIf="editingIndex !== null" type="button" (click)="cancelEdit()"
                    class="px-6 py-3 border-2 border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition-all">
                    Annuler
                </button>
            </div>
        </form>
    </div>
