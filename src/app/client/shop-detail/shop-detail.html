<div *ngIf="shop$ | async as shop" class="group bg-white border-slate-200 overflow-hidden transition-all duration-300 transform">
  <!-- Contenu de la card -->
  <div class="px-4 py-8">
    
    <!-- Header avec nom et catégorie -->
    <div class="mb-5">
      <div class="flex items-start justify-between mb-3">
        <div class="flex-1">
          <h3 class="text-5xl font-black text-slate-800 mb-2">
            {{ shop.name }}
          </h3>
          <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold border-2 bg-blue-100 text-blue-800">
            {{ shop.category.label }}
          </span>
        </div>
      </div>
    </div>

    <!-- Informations -->
    <div class="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-4 mb-5 border-2 border-slate-200">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-xs font-semibold text-slate-600 mb-1">Les Salles</div>
          <div class="text-xl font-black text-indigo-600">
            <span *ngFor="let room of shop.rooms" class="ml-2 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold border-2 text-black border-black">
                {{ room }}
            </span>
          </div>
        </div>
        <div>
          <div class="text-xs font-semibold text-slate-600 mb-1">Photos</div>
          <div class="text-xl font-black text-indigo-600">
            {{ shop.photos?.length || 0 }}
          </div>
        </div>
      </div>
    </div>

    <!-- Liste des photos miniatures -->
    <div *ngIf="shop.photos && shop.photos.length > 0" class="mb-5">
      <div class="text-xs font-semibold text-slate-600 mb-2 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        GALERIE
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div *ngFor="let photo of shop.photos; let i = index"
             class="relative aspect-square rounded-lg overflow-hidden cursor-pointer hover:opacity-80 transition-all">
          <img [src]="photo.url" [alt]="photo.type.label" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex items-end p-2">
            <span class="text-white text-xs font-bold">{{ photo.type.label }}</span>
          </div>
        </div>
      </div>
    </div>
