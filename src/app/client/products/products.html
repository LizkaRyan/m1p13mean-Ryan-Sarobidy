<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
    <div class="container mx-auto px-4 py-8">

        <div class="mb-10 relative">
            <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 mb-2"
                style="text-align: center;">
                Produits de la boutique
            </h1>
        </div>

        <div *ngIf="alertMessage" class="custom-alert" [ngClass]="alertType">
            {{ alertMessage }}
            <span class="close-btn" (click)="closeAlert()">×</span>
        </div>

        <ng-container *ngIf="products$ | async as products">
            <div *ngIf="!products.length"
                class="bg-white rounded-2xl shadow-lg border border-slate-200 p-12 text-center">
                <div class="text-6xl mb-4"><ng-icon name="empty" size="64"></ng-icon></div>
                <h3 class="text-xl font-semibold text-slate-700">Aucun produit disponible pour cette boutique</h3>
            </div>

            <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <div *ngFor="let p of products"
                    class="group bg-white rounded-2xl border-2 border-slate-200 overflow-hidden hover:border-indigo-300 hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">

                    <div class="h-48 bg-slate-100 overflow-hidden">
                        <img *ngIf="p.photos?.length" [src]="baseUrl + p.photos[0].url" [alt]="p.name"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                        <div *ngIf="!p.photos?.length" class="w-full h-full flex items-center justify-center text-5xl">
                            🖼️</div>
                    </div>

                    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 px-6 py-4">
                        <h3 class="text-xl font-bold text-white truncate">{{ p.name }}</h3>
                        <span class="text-indigo-100 text-sm">{{ p.category.label }}</span>
                    </div>

                    <div class="p-6 space-y-3">
                        <div class="text-slate-600 text-sm">Prix : <strong>{{ p.unityPrice }} €</strong></div>
                        <div class="text-slate-600 text-sm" *ngIf="p.description">{{ p.description }}</div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm px-2 py-1 rounded-full font-semibold" [ngClass]="{
                  'bg-green-100 text-green-700': p.status.code === 'AVAILABLE',
                  'bg-red-100 text-red-700': p.status.code !== 'AVAILABLE'
                }">
                                {{ p.status.label }}
                            </span>
                            <!-- ✅ Bouton Voir plus -->
                            <button *ngIf="p.photos?.length > 1" (click)="openGallery(p)"
                                class="text-sm text-indigo-600 font-semibold hover:text-indigo-800 transition-colors">
                                Voir plus ({{ p.photos.length - 1 }})
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </ng-container>
    </div>
</div>

<!-- ✅ POPUP GALERIE -->
<div *ngIf="selectedProduct" class="modal-overlay" (click)="closeGallery()">
    <div class="modal-box" (click)="$event.stopPropagation()">

        <div class="modal-header">
            <h3 class="text-lg font-bold text-slate-800">{{ selectedProduct.name }}</h3>
            <button (click)="closeGallery()" class="close-modal">×</button>
        </div>

        <!-- Image principale affichée -->
        <div class="modal-main-img">
            <img [src]="baseUrl + selectedProduct.photos[activePhotoIndex].url" [alt]="selectedProduct.name">
        </div>

        <!-- Miniatures -->
        <div class="modal-thumbs">
            <div *ngFor="let photo of selectedProduct.photos; let i = index" class="thumb-item"
                [class.active]="i === activePhotoIndex" (click)="activePhotoIndex = i">
                <img [src]="baseUrl + photo.url" [alt]="'Photo ' + (i+1)">
            </div>
        </div>

    </div>
</div>
