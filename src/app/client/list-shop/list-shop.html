<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <div class="mb-10">
      <div class="flex items-center gap-4 mb-3">
        <div>
          <h1 class="text-4xl font-black text-slate-800 tracking-tight">
            Réservations Actives
          </h1>
          <p class="text-slate-600 text-lg font-medium mt-1">
            Liste des box réservés
          </p>
        </div>
      </div>
    </div>

    <!-- Liste des réservations -->
    <div *ngIf="reservations.length === 0" class="text-center py-20 bg-white rounded-2xl border-2 border-slate-200">
      <div class="text-8xl mb-6">📋</div>
      <h3 class="text-3xl font-black text-slate-800 mb-3">Aucune réservation</h3>
      <p class="text-slate-600 text-lg">Il n'y a aucune réservation pour le moment</p>
    </div>

    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <div *ngFor="let reservation of reservations; let i = index"
           class="group bg-white rounded-2xl border-2 border-slate-200 overflow-hidden hover:border-indigo-300 hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1"
           [style.animation-delay]="i * 0.1 + 's'">
        
        <!-- Bande colorée en haut -->
        <div class="h-2 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
        
        <div class="p-6">
          <!-- En-tête avec boutique -->
          <div class="mb-5">
            <div class="flex items-start justify-between mb-3">
              <div class="flex-1">
                <h3 class="text-2xl font-black text-slate-800 mb-2">
                  {{ reservation.shopId.name }}
                </h3>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold border-2 bg-blue-100 text-blue-800 border-blue-300">
                  {{ reservation.shopId.category.label }}
                </span>
              </div>
            </div>
          </div>

          <!-- Informations du box -->
          <div class="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-4 mb-5 border-2 border-slate-200">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-md">
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
              </div>
              <div>
                <div class="text-xs font-semibold text-slate-600">BOX RÉSERVÉ</div>
                <div class="text-xl font-black text-slate-800">{{ reservation.roomId.name }}</div>
              </div>
            </div>
          </div>

          <!-- IDs -->
          <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-white rounded-lg p-3 border border-slate-200">
              <div class="text-xs text-slate-500 mb-1">ID Réservation</div>
              <div class="text-xs font-mono font-semibold text-slate-700 truncate">
                {{ reservation._id  }}
              </div>
            </div>
            <div class="bg-white rounded-lg p-3 border border-slate-200">
              <div class="text-xs text-slate-500 mb-1">ID Box</div>
              <div class="text-xs font-mono font-semibold text-slate-700 truncate">
                {{ reservation.roomId._id }}
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex gap-2 pt-4 border-t-2 border-slate-100">
            <button 
              (click)="onViewDetails(reservation)"
              class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-2.5 px-4 rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              Détails
            </button>
            
            <button 
              (click)="onEditReservation(reservation)"
              class="bg-slate-100 text-slate-700 font-bold py-2.5 px-4 rounded-xl hover:bg-slate-200 transition-all border-2 border-slate-200 flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
            
            <button 
              (click)="onDeleteReservation(reservation)"
              class="bg-red-100 text-red-700 font-bold py-2.5 px-4 rounded-xl hover:bg-red-200 transition-all border-2 border-red-200 flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
