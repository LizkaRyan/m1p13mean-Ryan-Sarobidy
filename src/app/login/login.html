<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <!-- Conteneur principal en deux colonnes -->
  <div class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="grid md:grid-cols-2 min-h-[600px]">
      
      <!-- GAUCHE : Section texte / branding -->
      <div class="bg-blue-600 p-12 flex flex-col justify-center relative overflow-hidden">
        
        <div class="relative z-10">
          <!-- Logo / Icône -->
          <div class="mb-8">
            <div class="w-16 h-16 bg-white rounded-xl flex items-center justify-center">
              <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
            </div>
          </div>

          <!-- Titre principal -->
          <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">
            Bienvenue sur<br />CenterHub
          </h1>

          <!-- Description -->
          <p class="text-blue-100 text-lg mb-8 leading-relaxed">
            La plateforme de confiance pour gérer vos projets professionnels avec efficacité et simplicité.
          </p>

          <!-- Badge fun -->
          <div class="inline-flex items-center gap-2 bg-orange-400 px-5 py-2 rounded-full mb-8">
            <span class="text-xl">✨</span>
            <span class="text-sm font-semibold text-white">+10 000 utilisateurs actifs</span>
          </div>

          <!-- Points clés -->
          <div class="space-y-3 text-blue-100">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-orange-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
              </svg>
              <span>100% sécurisé et confidentiel</span>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-orange-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
              </svg>
              <span>Interface intuitive et moderne</span>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-orange-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
              </svg>
              <span>Support client réactif 7j/7</span>
            </div>
          </div>
        </div>
      </div>

      <!-- DROITE : Formulaire de connexion -->
      <div class="p-12 flex flex-col justify-center">
        <div class="max-w-md w-full mx-auto">
          <h2 class="text-3xl font-bold text-slate-900 mb-2">
            Connexion
          </h2>
          <p class="text-slate-600 mb-8">
            Accédez à votre espace personnel
          </p>

          <!-- Formulaire -->
          <form (ngSubmit)="onLogin()" class="space-y-5">
            <!-- Email -->
            <div>
              <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">
                Adresse email
              </label>
              <input 
                type="email" 
                id="email"
                name="email"
                [(ngModel)]="email"
                class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                placeholder="votre@email.com"
                required
              />
            </div>

            <!-- Mot de passe -->
            <div>
              <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">
                Mot de passe
              </label>
              <input 
                type="password" 
                id="password"
                name="password"
                [(ngModel)]="password"
                class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                placeholder="••••••••"
                required
              />
            </div>

            <!-- Bouton de connexion -->
            <button 
              type="submit"
              (click)="onLogin()"
              class="w-full bg-blue-600 text-white font-semibold py-3 cursor-pointer rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">
              Se connecter
            </button>
          </form>

          <!-- Séparateur -->
          <div class="mt-8 mb-8 flex items-center">
            <div class="flex-1 border-t border-slate-300"></div>
            <span class="px-4 text-sm text-slate-500">OU</span>
            <div class="flex-1 border-t border-slate-300"></div>
          </div>

          <!-- Bouton inscription -->
          <button 
            (click)="onSignup()"
            class="w-full bg-white border-2 cursor-pointer border-blue-600 text-blue-600 font-semibold py-3 rounded-lg hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">
            Créer un compte
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
